<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game | Lab Activity 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🧠 Memory Card Game</h1>
            <p>Match all the pairs to win!</p>
        </header>

        <div class="game-stats">
            <div class="stat">
                <span class="stat-label">Moves</span>
                <span class="stat-value" id="moves">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Time</span>
                <span class="stat-value" id="timer">0:00</span>
            </div>
            <div class="stat">
                <span class="stat-label">Matches</span>
                <span class="stat-value" id="matches">0/8</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- Cards will be generated by JavaScript -->
        </div>

        <div class="game-controls">
            <button class="btn-game" id="restartBtn">🔄 Restart Game</button>
            <a href="../index.html" class="btn-game btn-back">← Back to Portfolio</a>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 Congratulations!</h2>
            <p>You completed the game!</p>
            <div class="final-stats">
                <p>Total Moves: <span id="finalMoves">0</span></p>
                <p>Time: <span id="finalTime">0:00</span></p>
            </div>
            <button class="btn-game" id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
